<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Agencia Tech</title>
</head>
<body>

    <header> 
        <img src="logo.png" alt="Logo Agencia Tech">
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contactate con nosotros</h1>
        <p>Dejanos un mensaje y nos pondremos en contacto con Ud. a la brevedad.</p>

           <form action="/enviar-datos" method="POST">

         <fieldset>
                <legend>Datos Personales</legend>
                
                <div class="campo">
                    <label for="nombre">Nombre y Apellido: <span aria-hidden="true" class="req-star">*</span></label>
                    <input type="text" id="nombreApellido" name="nombreApellido" required aria-required="true" aria-describedby="error-nombre">
                    <span id="error-nombre" class="error-message">Ingresa tu nombre y apellido</span>
                </div>
                
                <div class="campo">
                    <label for="email">Email: <span aria-hidden="true" class="req-star">*</span></label>
                    <input type="email" id="email" name="email" required aria-required="true" placeholder="ejemplo@correo.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" aria-describedby="error-email">
                    <span id="error-email" class="error-message">Inngresa tu email</span>
                </div>

                <div class="campo">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" pattern="[0-9]{10}" placeholder="Ej: 2215550000" aria-describedby="error-telefono">
                    <span id="error-telefono" class="error-message">Ingresa tu número de teléfono con la característica y sin 0.</span>
                </div>   
                </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Agencia Tech. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
